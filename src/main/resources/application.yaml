spring:
  application:
    name: UngDungGoiXe

  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 14MB

  datasource:
    url: jdbc:mysql://localhost:3306/UngDungGoiXe
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: update
    # Chạy schema-mysql.sql sau Hibernate để thêm cột còn thiếu (tránh lỗi login khi entity có field mới).
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      continue-on-error: true
  data:
    redis:
      host: localhost
      port: 6379
      password: 12345678
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
momo:
  partner-code: MOMO
  return-url: http://localhost:5173
  endpoint: https://test-payment.momo.vn/v2/gateway/api
  ipn-url: http://localhost:8080/api/momo/ipn-handler
  access-key: F8BBA842ECF85
  secret-key: K951B6PE1waDMi640xX08PD3vg6EkVlz
jwt:
  secret-key: ${JWT_SECRET}
  audience: ${JWT_AUDIENCE}
# Thư mục lưu ảnh GPLX (đường dẫn tương đối hoặc tuyệt đối)
app:
  web-base-url: ${APP_WEB_BASE_URL:http://localhost:5173}
  upload-dir: uploads
  owner-vehicle-upload:
    # Giới hạn kích thước từng file upload owner vehicle (bytes), có thể override bằng env.
    max-file-size-bytes: ${OWNER_VEHICLE_MAX_FILE_SIZE_BYTES:6291456}
