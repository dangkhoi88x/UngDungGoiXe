spring:
  application:
    name: UngDungGoiXe

  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 14MB

  datasource:
    url: jdbc:mysql://localhost:3306/UngDungGoiXe
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: update
    # Chạy schema-mysql.sql sau Hibernate để thêm cột còn thiếu (tránh lỗi login khi entity có field mới).
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      continue-on-error: true
  data:
    redis:
      host: localhost
      port: 6379
      password: 12345678

jwt:
  secret-key: ${JWT_SECRET}
  audience: ${JWT_AUDIENCE}
# Thư mục lưu ảnh GPLX (đường dẫn tương đối hoặc tuyệt đối)
app:
  upload-dir: uploads
