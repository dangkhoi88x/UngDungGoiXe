services:
  mysql:
    image: mysql:lts
    container_name: UngDungGoiXe
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: UngDungGoiXe
    volumes:
      - mysql_data:/var/lib/mysql
  redis:
    image: redis:8.6.2
    container_name: redis_be
    ports:
      - 6379:6379
    command: ["redis-server","--requirepass","12345678"]
volumes:
  mysql_data: